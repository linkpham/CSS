version: '3.8'

# Docker Compose for LOCAL development WITHOUT MySQL
# Uses SQLite for CareSoft cache tables instead of Docker MySQL
# This is lighter and doesn't require MySQL to be pre-installed

services:
  # PHP-FPM Service
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: zeus-dashboard-app
    restart: unless-stopped
    working_dir: /var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - zeus-dashboard-network

  # Nginx Service (Development - Port 8080)
  webserver:
    image: nginx:alpine
    container_name: zeus-dashboard-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - zeus-dashboard-network
    depends_on:
      - app

  # Redis for caching
  redis:
    image: redis:alpine
    container_name: zeus-dashboard-redis
    restart: unless-stopped
    networks:
      - zeus-dashboard-network

  # Queue Worker for background jobs
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: zeus-dashboard-queue
    restart: unless-stopped
    working_dir: /var/www
    user: root
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/queue-entrypoint.sh:/usr/local/bin/queue-entrypoint.sh:ro
    command: /bin/bash /usr/local/bin/queue-entrypoint.sh
    networks:
      - zeus-dashboard-network
    depends_on:
      - app
      - redis

  # Scheduler for running Laravel scheduled tasks
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: zeus-dashboard-scheduler
    restart: unless-stopped
    working_dir: /var/www
    user: root
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/scheduler-entrypoint.sh:/usr/local/bin/scheduler-entrypoint.sh:ro
    command: /bin/bash /usr/local/bin/scheduler-entrypoint.sh
    networks:
      - zeus-dashboard-network
    depends_on:
      - app
      - redis

networks:
  zeus-dashboard-network:
    driver: bridge
