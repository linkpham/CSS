; PHP-FPM Pool Configuration
; Phase 48: Increased pm.max_children to handle more concurrent requests
; The warning "[pool www] server reached pm.max_children setting (5)" indicates
; the default of 5 child processes was insufficient.

[www]
; User/Group for processes
user = www
group = www

; Listen on all interfaces (required for Docker networking)
; Phase 52: Changed from 127.0.0.1:9000 to 0.0.0.0:9000 to allow nginx container to connect
listen = 0.0.0.0:9000

; Process manager settings
; 'dynamic' = spawn children based on demand (recommended)
pm = dynamic

; Maximum number of child processes
; Increased from default 5 to 20 to handle more concurrent requests
; Calculate based on: available_memory / avg_process_memory
; With 512MB memory limit and ~25MB per PHP process = ~20 processes max
pm.max_children = 20

; Number of children created on startup
pm.start_servers = 5

; Minimum number of idle children
pm.min_spare_servers = 3

; Maximum number of idle children
pm.max_spare_servers = 10

; Number of requests before respawning a child (prevents memory leaks)
pm.max_requests = 500

; Slow log for requests taking longer than this
; Phase 54: Disabled slowlog to prevent permission issues in Docker
; The www user cannot create files in mounted volumes on some systems
; request_slowlog_timeout = 10s
; slowlog = /var/www/storage/logs/php-fpm-slow.log

; Terminate request if it takes longer than this (0 = disabled)
; Set to match php.ini max_execution_time
request_terminate_timeout = 600s

; Clear environment in FPM workers (security)
clear_env = no

; Ensure proper error logging
catch_workers_output = yes
decorate_workers_output = no
